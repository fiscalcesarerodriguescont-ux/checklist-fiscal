// ── Nome do usuário ──────────────────────────────────────────────────────
if(nomeUser){
  document.getElementById('nomeUsuario').value=nomeUser;
  document.getElementById('nomeConfirmado').textContent='✓ '+nomeUser;
}
function salvarNome(){
  const v=document.getElementById('nomeUsuario').value.trim();
  if(!v)return;
  nomeUser=v;
  localStorage.setItem('cr_nome',v);
  document.getElementById('nomeConfirmado').textContent='✓ '+v;
}

// ── Tabs de mês ──────────────────────────────────────────────────────────
(function(){
  const c=document.getElementById('mesTabs');
  MESES.forEach(m=>{
    const b=document.createElement('button');
    b.className='mes-tab'+(m.k===mesSel?' ativo':'');
    b.textContent=m.l;
    b.onclick=()=>setMes(m.k);
    c.appendChild(b);
  });
})();
function setMes(k){
  mesSel=k;
  document.querySelectorAll('.mes-tab').forEach((b,i)=>b.classList.toggle('ativo',MESES[i].k===k));
  render();
}

// ── Firebase sync ────────────────────────────────────────────────────────
function setSyncStatus(st,msg){
  const dot=document.getElementById('syncDot');
  dot.className='sync-dot '+st;
  document.getElementById('syncMsg').textContent=msg;
}

function initFirebase(){
  // Escuta TODAS as mudanças do banco em tempo real
  window._fbOn('checklist', val=>{
    ST = val||{};
    setSyncStatus('ok','🟢 Sincronizado — '+new Date().toLocaleTimeString('pt-BR'));
    render();
  });
}

window.addEventListener('fb-ready', initFirebase);
// Fallback: se Firebase não carregar (ex: config não preenchida), funciona offline
setTimeout(()=>{
  if(!window._fbReady){
    setSyncStatus('err','⚠️ Firebase não configurado — modo offline');
    render();
  }
},3000);

// ── Salvar no Firebase ───────────────────────────────────────────────────
let saveTimer=null;
function saveToFirebase(){
  if(!window._fbSet) return;
  clearTimeout(saveTimer);
  setSyncStatus('sync','💾 Salvando...');
  saveTimer=setTimeout(()=>{
    window._fbSet('checklist', ST)
      .then(()=>setSyncStatus('ok','🟢 Salvo — '+new Date().toLocaleTimeString('pt-BR')))
      .catch(()=>setSyncStatus('err','❌ Erro ao salvar'));
  }, 600);
}

// ── Lógica de obrigações ─────────────────────────────────────────────────
function rcat(r){
  if(r.includes('Simples'))return'SN';
  if(r.includes('MEI'))return'MEI';
  if(r.includes('Presumido'))return'LP';
  if(r.includes('Real'))return'LR';
  if(r.includes('Imune'))return'IE';
  if(r.includes('Filial'))return'FI';
  return'—';
}

function getItens(e){
  const rc=rcat(e.r),ie=e.ie,ufs=e.ufs_ie||[];
  let obg=[];
  if(rc==='SN')  obg=[['PGDAS-D','Mensal'],['DAS','Mensal'],['DEFIS','Anual'],['EFD-Reinf','Mensal'],['DCTFWeb (se retenções)','Mensal']];
  else if(rc==='MEI') obg=[['DAS-MEI','Mensal'],['DASN-SIMEI','Anual']];
  else if(rc==='LP')  obg=[['DCTFWeb','Mensal'],['EFD-Contribuições (PIS/COFINS)','Mensal'],['EFD-Reinf','Mensal'],['MIT','Mensal']];
  else if(rc==='LR')  obg=[['DCTFWeb','Mensal'],['EFD-Contribuições (PIS/COFINS)','Mensal'],['EFD-Reinf','Mensal'],['MIT','Mensal']];
  else if(rc==='IE')  obg=[['DCTF (se houver retenções)','Mensal'],['EFD-Reinf (se houver)','Mensal'],['Declaração Isenção/Imunidade','Anual']];
  else if(rc==='FI')  obg=[['Consolidação com Matriz (ECF/ECD/DCTF)','Conforme matriz'],['EFD-Reinf','Mensal']];
  let guias=[];
  if(ie) guias.push([rc==='SN' ? 'ICMS Antecipação' : 'ICMS','Mensal']);
  if(ie) guias.push(['Fundos Estaduais (FECOP/FCP)','Mensal']);
  if(ie&&(e.r.includes('Indústria')||e.r.includes('Real')||e.r.includes('Presumido'))) guias.push(['IPI','Mensal']);
  if(!e.r.includes('Comércio')&&rc!=='MEI') guias.push(['ISS Prestado','Mensal']);
  guias.push(['ISS Retido (tomador)','Mensal']);
  if(rc==='LP'||rc==='LR') guias.push(['PIS/COFINS','Mensal']);
  guias.push(['Retenções Federais (IRRF/CSRF)','Mensal']);
  if(e.ret) guias.push(['Guia RET','Mensal']);
  if(rc==='LP') guias.push(['IRPJ','Trimestral'],['CSLL','Trimestral']);
  let gia=[];
  if(ie&&ufs.length){
    if(rc!=='SN') gia.push({nome:'EFD-ICMS/IPI (SPED)',per:'Mensal',uf:''});
    if(rc!=='SN') gia.push({nome:'ICMS-ST — recolhimento',per:'Mensal',uf:''});
    if(rc==='SN') gia.push({nome:'DeSTDA',per:'Mensal',uf:''});
    ufs.forEach(uf=>gia.push({nome: rc==='SN' ? 'SINTEGRA' : (uf==='SC' ? 'DIME' : 'GIA-ST / DIFAL'), per:'Mensal',uf:uf}));
  }
  return{obg,guias,gia};
}

function filtrarPeriodo(itens,isGia){
  const mes=mesSel.split('-')[1];
  return itens.filter(it=>{
    const per=isGia?it.per:it[1];
    if(per==='Mensal') return true;
    if(per==='Anual') return mes==='12';
    if(per==='Trimestral') return ['03','06','09','12'].includes(mes);
    return true;
  });
}

function stKey(ei,grp,j){return`${mesSel}|${ei}|${grp}|${j}`;}

function getCardKeys(e,i){
  const{obg,guias,gia}=getItens(e);
  const keys=[];
  [['o',obg,false],['g',guias,false],['a',gia,true]].forEach(([g,itens,isGia])=>{
    filtrarPeriodo(itens,isGia).forEach((_,j)=>keys.push(stKey(i,g,j)));
  });
  return keys;
}

function buildSecao(titulo,itens,labelTxt,labelClass,secClass,grpKey,isGia,ei){
  const filtrados=filtrarPeriodo(itens,isGia);
  if(!filtrados.length)return'';
  const rows=filtrados.map((it,j)=>{
    const nome=isGia?it.nome:it[0];
    const per=isGia?it.per:it[1];
    const ufTag=isGia&&it.uf?`<span class="uf-tag">${it.uf}</span>`:'';
    const id=`cb_${ei}_${grpKey}_${j}`;
    const key=stKey(ei,grpKey,j);
    const checked=!!(ST[key]&&ST[key].ok);
    const quem=ST[key]&&ST[key].por?`<span class="quem">(${ST[key].por})</span>`:'';
    const okCls=checked?' ok':'';
    const pendHide=sosPendentes&&checked?' pend-hide':'';
    const obsKey=`obs|${key}`;
    const obsVal=(ST[obsKey]&&typeof ST[obsKey]==='string')?ST[obsKey]:'';
    return`<tr id="tr_${id}" class="${okCls}${pendHide}">
      <td class="grp-label ${labelClass}">${j===0?labelTxt:''}</td>
      <td><div class="chk-row"><input type="checkbox" id="${id}"${checked?' checked':''} onchange="ckRow('${id}','${key}',${ei},this.checked)"><label for="${id}">${nome}${ufTag}${quem}</label></div></td>
      <td><span class="per">${per}</span></td>
      <td onclick="event.stopPropagation()" style="padding:3px 6px"><textarea rows="1" style="width:100%;font-size:10px;border:0.5px solid #e0dcd0;border-radius:4px;background:#fffef9;color:#444;font-family:inherit;resize:none;outline:none;padding:3px 6px;cursor:text;box-sizing:border-box" placeholder="Anotação..." onclick="event.stopPropagation()" oninput="saveObs('${obsKey}',this.value)">${obsVal}</textarea></td>
    </tr>`;
  }).join('');
  return`<div class="secao ${secClass}"><div class="sec-titulo">${titulo}</div>
    <table><thead><tr><th style="width:76px">Grupo</th><th>Obrigação / Guia</th><th style="width:100px">Periodicidade</th><th style="width:120px">Observação</th></tr></thead>
    <tbody>${rows}</tbody></table></div>`;
}

function card(e,i){
  const{obg,guias,gia}=getItens(e);
  const im=e.im?`<span style="font-size:10px;color:#aaa;margin-left:4px">IM: ${e.im}</span>`:'';
  const rc=rcat(e.r);
  const bdg={'SN':'sn','LP':'lp','LR':'lr','MEI':'mei','FI':'fi','IE':'no-ie','—':'no-ie'}[rc]||'no-ie';
  const bdgTxt={'SN':'SN','LP':'LP','LR':'LR','MEI':'MEI','FI':'Filial','IE':'Isenta','—':'—'}[rc];
  const respMap={'Francieli':'rF','Grazielle Junglos':'rGz','Murilo':'rM','Suele Zabloski':'rS','Mayara':'rMy','Thuane de Souza Vicente':'rT','Grasiele Bona Rodrigues':'rGs','João Felipe':'rJF','Jonathas':'rJn'};
  const sObg  =e.sem_obg?'<div style="padding:16px;text-align:center;color:#aaa;font-size:12px">📋 Empresa apenas para consultoria — sem entrega de obrigações</div>':buildSecao('Obrigações Acessórias',obg,'Federal','fed-label','sec-obg','o',false,i);
  const sGuias=e.sem_obg?'':buildSecao('Controle de Guias',guias,'Guias','gui-label','sec-guias','g',false,i);
  const sGia  =e.sem_obg?'':buildSecao('GIA-ST / DIFAL por Estado',gia,'Estadual','gia-label','sec-gia','a',true,i);
  const allKeys=getCardKeys(e,i);
  const total=allKeys.length;
  const ok=allKeys.filter(k=>ST[k]&&ST[k].ok).length;
  const pct=total?Math.round(ok/total*100):0;
  const cardHide=sosPendentes&&pct===100?' style="display:none"':'';
  const cardEnc=isEncerrada(e.c)?' style="opacity:0.6;border-left:4px solid #f5c0c0"':'';
  return`<div class="card" id="card${i}"${cardHide||cardEnc}>
    <div class="hdr" onclick="tog(${i})">
      <span class="badge ${bdg}">${bdgTxt}</span>
      ${e.ie?'<span class="badge ie-s">IE</span>':'<span class="badge no-ie">Sem IE</span>'}
      <span class="uf-b">${e.u&&e.u!=='nan'?e.u:'—'}</span>
      <div style="flex:1;min-width:0">
        <div class="nome">${e.n}${isEncerrada(e.c)?'<span class="tag-enc">⛔ Encerrado a partir de jul/26</span>':''} ${e.sem_obg?'<span class="tag-consultoria">📋 Apenas Consultoria</span>':''} ${e.ret?'<span class="tag-ret">🏗 Guia RET</span>':''}</div>
        <div class="cnpj">${e.c}${im}</div>
        <div class="prog"><div class="prog-bar${pct===100?' completo':''}" style="width:${pct}%"></div></div>
      </div>
      <span style="font-size:10px;color:#999;margin:0 4px;white-space:nowrap">${ok}/${total}</span>
      <span class="resp ${respMap[e.resp]||''}">${e.resp}</span>
      <span class="tog">&#9660;</span>
    </div>
    <div class="body">${sObg}${sGuias}${sGia}</div>
  </div>`;
}

function saveObs(key,val){
  if(!ST[key]) ST[key]={};
  ST[key]=val;
  saveToFirebase();
}
function ckRow(id,key,ei,checked){
  // Salva {ok: true/false, por: "nome", quando: timestamp}
  if(!ST[key]) ST[key]={};
  ST[key]={ok:checked, por:nomeUser||'?', quando:new Date().toISOString()};
  if(!checked) ST[key].ok=false;
  const tr=document.getElementById('tr_'+id);
  if(tr){
    tr.classList.toggle('ok',checked);
    if(sosPendentes&&checked) tr.classList.add('pend-hide');
    // atualizar "quem" na label
    const lbl=tr.querySelector('label');
    if(lbl){
      let txt=lbl.textContent.replace(/\(.*?\)/g,'').trim();
      if(checked&&nomeUser) txt+=` (${nomeUser})`;
      lbl.textContent=txt;
    }
  }
  saveToFirebase();
  updateCardProg(ei);
  updateResumo();
}

function updateCardProg(ei){
  const e=D[ei]; if(!e)return;
  const keys=getCardKeys(e,ei);
  const total=keys.length;
  const ok=keys.filter(k=>ST[k]&&ST[k].ok).length;
  const pct=total?Math.round(ok/total*100):0;
  const bar=document.querySelector(`#card${ei} .prog-bar`);
  if(bar){bar.style.width=pct+'%';bar.className='prog-bar'+(pct===100?' completo':'');}
  const lbl=document.querySelector(`#card${ei} .hdr span[style*="font-size:10px"]`);
  if(lbl)lbl.textContent=`${ok}/${total}`;
  if(sosPendentes&&pct===100){const c=document.getElementById('card'+ei);if(c)c.style.display='none';}
}

function updateResumo(){
  let tot=0,ok=0;
  vis.forEach(e=>{
    const ei=D.indexOf(e);
    const keys=getCardKeys(e,ei);
    tot+=keys.length;
    ok+=keys.filter(k=>ST[k]&&ST[k].ok).length;
  });
  document.getElementById('rTotal').textContent=tot;
  document.getElementById('rOk').textContent=ok;
  document.getElementById('rPend').textContent=tot-ok;
  document.getElementById('rBar').style.width=(tot?Math.round(ok/tot*100):0)+'%';
}

function togglePend(){
  sosPendentes=!sosPendentes;
  document.getElementById('btnPend').classList.toggle('ativo',sosPendentes);
  render();
}
function tog(i){document.getElementById('card'+i).classList.toggle('open');}
function toggleAll(o){document.querySelectorAll('.card').forEach(c=>o?c.classList.add('open'):c.classList.remove('open'));}

let vis=[];
function filtrar(){
  const rp=document.getElementById('fResp').value,rg=document.getElementById('fReg').value,
        ie=document.getElementById('fIE').value,b=document.getElementById('fBusca').value.toLowerCase();
  vis=D.filter(e=>{
    if(rp&&e.resp!==rp)return false;
    if(rg&&!e.r.includes(rg))return false;
    if(ie==='sim'&&!e.ie)return false;
    if(ie==='nao'&&e.ie)return false;
    if(b&&!e.n.toLowerCase().includes(b)&&!e.c.includes(b))return false;
    return true;
  });
  render();
}

function render(){
  const l=document.getElementById('lista');
  if(!vis.length){l.innerHTML='<div class="nenhum">Nenhuma empresa encontrada.</div>';document.getElementById('contador').textContent='0 empresas';updateResumo();return;}
  const _open=Array.from(document.querySelectorAll('.card.open')).map(c=>c.id);l.innerHTML=vis.map((e,i)=>card(e,D.indexOf(e))).join('');_open.forEach(id=>{const c=document.getElementById(id);if(c)c.classList.add('open');});
  document.getElementById('contador').textContent=vis.length+' empresa'+(vis.length!==1?'s':'');
  updateResumo();
}

vis=[...D];
// Render inicial (offline até Firebase responder)
render();
</script>
</body>
</html>
